<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>health · jakob melchard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: rgba(0,0,0,0.4);
      --border: rgba(100,100,100,0.15);
      --muted: #6272a4;
      --green: #50fa7b;
      --red: #ff5555;
    }
    body {
      background: linear-gradient(135deg, #000 0%, var(--bg) 100%);
      font-family: 'JetBrains Mono', 'Monaco', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(139,233,253,0.03) 0%, transparent 50%);
      animation: rotate 30s linear infinite;
      pointer-events: none;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      z-index: 1;
      transition: border-color 0.4s;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    .dot.up {
      background: var(--green);
      box-shadow: 0 0 8px rgba(80,250,123,0.7);
      animation: pulse 2s ease-in-out infinite;
    }
    .dot.down {
      background: var(--red);
      box-shadow: 0 0 8px rgba(255,85,85,0.7);
    }
    .dot.checking {
      background: var(--muted);
      box-shadow: none;
      animation: pulse 0.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .label {
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.4s;
    }
    .label.up       { color: var(--green); }
    .label.down     { color: var(--red); }
    .label.checking { color: var(--muted); }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot checking" id="dot"></div>
    <div class="label checking" id="label">checking…</div>
  </div>

  <script>
    const dot   = document.getElementById('dot');
    const label = document.getElementById('label');

    // URL of your Worker
    const WORKER_URL = 'https://ping.melchard.org';

    async function check() {
      setState('checking'); // show checking state
      try {
        const res = await fetch(WORKER_URL, { cache: 'no-store' });
        setState(res.ok ? 'up' : 'down');
      } catch {
        setState('down');
      }
    }

    function setState(state) {
      dot.className   = 'dot ' + state;
      label.className = 'label ' + state;
      label.textContent = state === 'checking' ? 'checking…' : state;
    }

    // Initial check and repeat every 30 seconds
    check();
    setInterval(check, 30_000);
  </script>
</body>
</html>
